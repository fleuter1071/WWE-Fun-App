<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WWE Events Prototype</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --text: #f3f5f7;
      --muted: #a8b0bd;
      --accent: #ff4747;
      --accent-2: #ff7a7a;
      --border: #2b3242;
      --success: #43c47a;
      --warning: #f0b429;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0d0f14 0%, #131824 100%);
      color: var(--text);
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .title-wrap h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .controls input,
    .controls select,
    .controls button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    .controls button {
      cursor: pointer;
      background: var(--accent);
      border: none;
      font-weight: 600;
    }

    .controls button:hover {
      background: var(--accent-2);
    }

    .status-bar {
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(23, 26, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      min-height: 500px;
      backdrop-filter: blur(8px);
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      font-weight: 700;
    }

    .event-list {
      max-height: 75vh;
      overflow: auto;
      padding: 12px;
    }

    .event-card {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      background: var(--panel-2);
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .event-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .event-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 71, 71, 0.2);
    }

    .event-thumb {
      width: 100%;
      height: 82px;
      object-fit: cover;
      border-radius: 10px;
      background: #0b0d12;
    }

    .event-meta h3 {
      margin: 0 0 6px 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    .event-meta .line {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 4px;
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .badge.finished {
      background: rgba(67, 196, 122, 0.14);
      color: var(--success);
    }

    .badge.upcoming {
      background: rgba(240, 180, 41, 0.14);
      color: var(--warning);
    }

    .detail {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .hero {
      position: relative;
      min-height: 250px;
      background: #111;
      border-bottom: 1px solid var(--border);
    }

    .hero img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      opacity: 0.82;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(15,17,21,0.94), rgba(15,17,21,0.25));
      display: flex;
      align-items: end;
      padding: 20px;
    }

    .hero-overlay h2 {
      margin: 0 0 8px 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .hero-sub {
      color: #d7dce4;
      font-size: 0.96rem;
    }

    .detail-body {
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .info-box {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .info-box .label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .info-box .value {
      font-size: 1rem;
      line-height: 1.4;
    }

    .section {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .section h3 {
      margin: 0 0 12px 0;
      font-size: 1rem;
    }

    .multiline {
      white-space: pre-line;
      color: #e6eaf0;
      line-height: 1.55;
    }

    .video-link {
      display: inline-block;
      margin-top: 8px;
      color: #fff;
      background: var(--accent);
      padding: 10px 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }

    .video-link:hover {
      background: var(--accent-2);
    }

    .empty {
      padding: 24px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .event-list {
        max-height: none;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-wrap">
        <h1>WWE Events Prototype</h1>
        <p>Simple test UI for TheSportsDB WWE events endpoint</p>
      </div>

      <div class="controls">
        <select id="seasonSelect">
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
        <input id="searchInput" type="text" placeholder="Search event name or city..." />
        <button id="loadBtn">Load Events</button>
      </div>
    </div>

    <div class="status-bar" id="statusBar">Ready.</div>

    <div class="layout">
      <div class="panel">
        <div class="panel-header">Events</div>
        <div id="eventList" class="event-list"></div>
      </div>

      <div class="panel detail" id="detailPanel">
        <div class="empty">Select an event to see details.</div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "123";
    const LEAGUE_ID = "4444";

    const eventListEl = document.getElementById("eventList");
    const detailPanelEl = document.getElementById("detailPanel");
    const statusBarEl = document.getElementById("statusBar");
    const seasonSelectEl = document.getElementById("seasonSelect");
    const searchInputEl = document.getElementById("searchInput");
    const loadBtnEl = document.getElementById("loadBtn");

    let allEvents = [];
    let filteredEvents = [];
    let selectedEventId = null;

    const sampleData = {
      events: [
        {
          idEvent: "2403782",
          strEvent: "SmackDown #1376",
          strSeason: "2026",
          strDescriptionEN: "Eight Man Tag Team Match\\nAlexa Bliss, Charlotte Flair, IYO SKY & Rhea Ripley vs. Lash Legend, Nia Jax & The Kabuki Warriors (Asuka & Kairi Sane)\\n\\nSingles Match\\nMatt Cardona vs. Kit Wilson",
          strResult: "Eight Man Tag Team Match\\nAlexa Bliss, Charlotte Flair, IYO SKY & Rhea Ripley defeat Lash Legend, Nia Jax & The Kabuki Warriors (Asuka & Kairi Sane) (14:32)\\n\\nSingles Match\\nMatt Cardona defeats Kit Wilson (4:19)",
          strTimestamp: "2026-01-03T01:00:00",
          dateEvent: "2026-01-03",
          dateEventLocal: "2026-01-02",
          strTime: "01:00:00",
          strTimeLocal: "20:00:00",
          idVenue: "24841",
          strVenue: "Keybank Center",
          strCountry: "United States",
          strCity: "Buffalo, New York",
          strFanart: "https://r2.thesportsdb.com/images/media/event/fanart/vumu8a1767432229.jpg",
          strThumb: "https://r2.thesportsdb.com/images/media/event/thumb/72qxa31767432222.jpg",
          strVideo: "https://www.youtube.com/watch?v=zyMRVXpyk64",
          strStatus: "Match Finished",
          strPostponed: "no"
        },
        {
          idEvent: "2403787",
          strEvent: "RAW #1702 Raw Is Stranger Things",
          strSeason: "2026",
          strDescriptionEN: "WWE Women's Tag Team Title Match\\nThe Kabuki Warriors (Asuka & Kairi Sane) (c) vs. IYO SKY & Rhea Ripley\\n\\nWWE World Heavyweight Title Match\\nCM Punk (c) vs. Bron Breakker",
          strResult: "WWE Women's Tag Team Title Match\\nIYO SKY & Rhea Ripley defeat The Kabuki Warriors (Asuka & Kairi Sane) (c) (16:27) - TITLE CHANGE !!!\\n\\nWWE World Heavyweight Title Match\\nCM Punk (c) defeats Bron Breakker (26:34)",
          strTimestamp: "2026-01-06T01:00:00",
          dateEvent: "2026-01-06",
          dateEventLocal: "2026-01-05",
          strTime: "01:00:00",
          strTimeLocal: "20:00:00",
          idVenue: "23447",
          strVenue: "Barclays Center",
          strCountry: "United States",
          strCity: "New York City, New York",
          strFanart: "https://r2.thesportsdb.com/images/media/event/fanart/3sm08d1767710545.jpg",
          strThumb: "https://r2.thesportsdb.com/images/media/event/thumb/du3nfu1767769212.jpg",
          strVideo: "https://www.youtube.com/watch?v=QHx4tLRlc5Q",
          strStatus: "Match Finished",
          strPostponed: "no"
        }
      ]
    };

    function setStatus(message) {
      statusBarEl.textContent = message;
    }

    function formatStatus(status) {
      return status === "Match Finished" ? "Finished" : status || "Unknown";
    }

    function getBadgeClass(status) {
      return status === "Match Finished" ? "finished" : "upcoming";
    }

    function safeText(value, fallback = "—") {
      return value && String(value).trim() ? value : fallback;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "—";
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function renderList(events) {
      if (!events.length) {
        eventListEl.innerHTML = '<div class="empty">No events found.</div>';
        return;
      }

      eventListEl.innerHTML = events.map(event => {
        const thumb = event.strThumb || event.strFanart || "https://via.placeholder.com/320x180?text=WWE";
        const isActive = event.idEvent === selectedEventId ? "active" : "";
        const badgeClass = getBadgeClass(event.strStatus);

        return `
          <div class="event-card ${isActive}" data-id="${event.idEvent}">
            <img class="event-thumb" src="${thumb}" alt="${safeText(event.strEvent)}" />
            <div class="event-meta">
              <h3>${safeText(event.strEvent)}</h3>
              <div class="line">${formatDate(event.dateEventLocal || event.dateEvent)} • ${safeText(event.strTimeLocal)}</div>
              <div class="line">${safeText(event.strVenue)} • ${safeText(event.strCity)}</div>
              <span class="badge ${badgeClass}">${formatStatus(event.strStatus)}</span>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".event-card").forEach(card => {
        card.addEventListener("click", () => {
          const id = card.dataset.id;
          const event = filteredEvents.find(e => e.idEvent === id);
          if (event) {
            selectedEventId = id;
            renderList(filteredEvents);
            renderDetail(event);
          }
        });
      });
    }

    function renderDetail(event) {
      const heroImage = event.strFanart || event.strThumb || "https://via.placeholder.com/1200x400?text=WWE+Event";
      const videoLink = event.strVideo
        ? `<a class="video-link" href="${event.strVideo}" target="_blank" rel="noopener noreferrer">Watch Video</a>`
        : "";

      detailPanelEl.innerHTML = `
        <div class="hero">
          <img src="${heroImage}" alt="${safeText(event.strEvent)}" />
          <div class="hero-overlay">
            <div>
              <h2>${safeText(event.strEvent)}</h2>
              <div class="hero-sub">
                ${formatDate(event.dateEventLocal || event.dateEvent)} • ${safeText(event.strTimeLocal)} • ${safeText(event.strVenue)}, ${safeText(event.strCity)}
              </div>
            </div>
          </div>
        </div>

        <div class="detail-body">
          <div class="detail-grid">
            <div class="info-box">
              <div class="label">Status</div>
              <div class="value">${formatStatus(event.strStatus)}</div>
            </div>
            <div class="info-box">
              <div class="label">Season</div>
              <div class="value">${safeText(event.strSeason)}</div>
            </div>
            <div class="info-box">
              <div class="label">Venue</div>
              <div class="value">${safeText(event.strVenue)}</div>
            </div>
            <div class="info-box">
              <div class="label">Location</div>
              <div class="value">${safeText(event.strCity)}, ${safeText(event.strCountry)}</div>
            </div>
          </div>

          <div class="section">
            <h3>Announced Card</h3>
            <div class="multiline">${safeText(event.strDescriptionEN, "No card available.")}</div>
          </div>

          <div class="section">
            <h3>Results</h3>
            <div class="multiline">${safeText(event.strResult, "No results available.")}</div>
            ${videoLink}
          </div>
        </div>
      `;
    }

    function applySearch() {
      const query = searchInputEl.value.trim().toLowerCase();

      filteredEvents = allEvents.filter(event => {
        const haystack = [
          event.strEvent,
          event.strCity,
          event.strVenue,
          event.strDescriptionEN
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return haystack.includes(query);
      });

      renderList(filteredEvents);

      if (!filteredEvents.find(e => e.idEvent === selectedEventId)) {
        selectedEventId = filteredEvents[0]?.idEvent || null;
        if (filteredEvents[0]) {
          renderDetail(filteredEvents[0]);
        } else {
          detailPanelEl.innerHTML = '<div class="empty">No matching event selected.</div>';
        }
      }
    }

    async function loadEvents() {
      const season = seasonSelectEl.value;
      const url = `https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsseason.php?id=${LEAGUE_ID}&s=${season}`;

      setStatus(`Loading WWE ${season} events...`);

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.events || !Array.isArray(data.events)) {
          throw new Error("No events array returned");
        }

        allEvents = data.events;
        filteredEvents = [...allEvents];
        selectedEventId = filteredEvents[0]?.idEvent || null;

        renderList(filteredEvents);

        if (filteredEvents[0]) {
          renderDetail(filteredEvents[0]);
        } else {
          detailPanelEl.innerHTML = '<div class="empty">No events returned.</div>';
        }

        setStatus(`Loaded ${filteredEvents.length} WWE events for ${season}.`);
      } catch (error) {
        console.warn("Live fetch failed. Using sample data instead.", error);

        allEvents = sampleData.events;
        filteredEvents = [...allEvents];
        selectedEventId = filteredEvents[0]?.idEvent || null;

        renderList(filteredEvents);

        if (filteredEvents[0]) {
          renderDetail(filteredEvents[0]);
        } else {
          detailPanelEl.innerHTML = '<div class="empty">No sample events available.</div>';
        }

        setStatus("Live fetch failed, so sample WWE data is being shown instead.");
      }
    }

    loadBtnEl.addEventListener("click", loadEvents);
    searchInputEl.addEventListener("input", applySearch);

    loadEvents();
  </script>
</body>
</html>
